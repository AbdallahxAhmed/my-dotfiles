# ==========================================
# Fonts
# ==========================================
font_family      CaskaydiaCove Nerd Font Mono
font_size        15.0
text_composition_strategy 1.8 0

# Add vertical breathing room between lines to prevent overlapping
modify_font cell_height 115%

# ==========================================
# Glass Effect (Optimized for Wayland/KDE)
# ==========================================
background_opacity         0.65
background_blur            32
dynamic_background_opacity yes

# ==========================================
# Window Layout
# ==========================================
window_padding_width       20
confirm_os_window_close    0

# ==========================================
# Cursor Aesthetic
# ==========================================
cursor_shape               beam
cursor_beam_thickness      1.5
cursor_blink_interval      0

# ==========================================
# Tab Bar (Unixporn Style)
# ==========================================
tab_bar_edge              top
tab_bar_style             powerline
tab_powerline_style       slanted
active_tab_foreground     #1d2021
active_tab_background     #fe8019

# ==========================================
# Cursor Animation (Cartoon/Trail Effect)
# ==========================================
# Enable cursor trail (3 provides the smoothest fluid animation)
cursor_trail 3

# Trail decay (first value sets fade out speed, second sets trail length)
cursor_trail_decay 0.1 0.4

# Movement threshold to trigger the trail (2 means it appears instantly during fast typing)
cursor_trail_start_threshold 2

# ==========================================
# Dynamic Window & Content Behavior
# ==========================================
# Center content to maintain symmetrical padding if window size isn't a perfect multiple of cell size
placement_strategy center

# Resize by character cells to prevent uneven black borders and dead spaces
resize_in_steps yes

# Smooth visual scaling of content while resizing the window
resize_draw_strategy scale

# Force a specific elegant size on startup instead of maximizing or remembering
remember_window_size  no
initial_window_width  120c
initial_window_height 32c

# Enable dynamic layouts for internal splits and multiplexing
enabled_layouts splits,stack,tall,fat
